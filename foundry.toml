# =============================================================================
# Etrna Chain Dev — Foundry Project Configuration
# =============================================================================

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
fs_permissions = [{ access = "read-write", path = "." }]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "openzeppelin-contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

# Gas reporting
gas_reports = ["*"]

# Fuzz testing
[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x1"

[invariant]
runs = 256
depth = 64
fail_on_revert = false

# FFI profile — scoped, not global
[profile.ffi]
ffi = true

# Fork testing profiles
[profile.fork]
eth_rpc_url = "${FORK_RPC_URL}"
fork_block_number = 21_000_000

# ============ Alchemy RPC Profiles ============

[profile.base-sepolia]
eth_rpc_url = "https://base-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[profile.base-mainnet]
eth_rpc_url = "https://base-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[profile.eth-sepolia]
eth_rpc_url = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[profile.eth-mainnet]
eth_rpc_url = "https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[profile.arbitrum]
eth_rpc_url = "https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[profile.polygon]
eth_rpc_url = "https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

[profile.optimism]
eth_rpc_url = "https://opt-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}"

# Etherscan verification (fill in when deploying)
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
